<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | GSBrand Works</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/public/favicon-circular.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/styles.css">

<body class="bg-surface-950 text-white font-inter overflow-x-hidden">
  <div id="navbar"></div>

  <section class="min-h-[70vh] flex items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-brand-900/30 via-surface-950 to-purple-900/20"></div>
    <div class="absolute inset-0 bg-grid-pattern opacity-20"></div>
    <div class="absolute top-1/3 left-1/4 w-72 h-72 bg-brand-600/10 rounded-full blur-3xl animate-blob"></div>
    <div class="absolute bottom-1/3 right-1/4 w-72 h-72 bg-purple-600/10 rounded-full blur-3xl animate-blob animation-delay-2000"></div>
    <div class="relative text-center px-4">
      <p class="text-8xl md:text-9xl font-black font-montserrat text-gradient mb-4">404</p>
      <h1 class="text-2xl md:text-4xl font-bold font-montserrat mb-4">Page Not Found</h1>
      <p class="text-gray-400 text-base mb-8 max-w-md mx-auto">Oops! The page you're looking for doesn't exist or has been moved.</p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="/" class="btn-gradient px-8 py-3 rounded-full text-white font-semibold text-sm shadow-lg active:scale-95 inline-flex items-center gap-2 group">
          <i class="fas fa-home"></i> Back to Home
        </a>
        <a href="/contact.html" class="px-8 py-3 rounded-full glass text-white font-semibold text-sm hover:bg-white/10 transition-all inline-flex items-center gap-2">
          <i class="fas fa-envelope"></i> Contact Us

    </div>

  <div id="footer"></div>
  <script type="module" src="/js/main.js"></script>
