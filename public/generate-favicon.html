<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Favicon — GSBrand Works</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #070619; color: white; gap: 20px; }
    canvas { border: 1px solid #333; border-radius: 12px; }
    button { padding: 10px 24px; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .row { display: flex; gap: 20px; align-items: center; }
  </style>
</head>
<body>
  <h1>GSBrand Works — Favicon Generator</h1>
  <div class="row">
    <div>
      <h3>favicon.png (180×180)</h3>
      <canvas id="c180" width="180" height="180"></canvas>
    </div>
    <div>
      <h3>favicon.ico (32×32)</h3>
      <canvas id="c32" width="32" height="32"></canvas>
    </div>
  </div>
  <div class="row">
    <button onclick="download('c180','favicon.png')">Download PNG</button>
    <button onclick="download('c32','favicon.ico')">Download ICO (as PNG)</button>
  </div>
  <p style="color:#666;font-size:12px;">Right-click canvas → "Save Image As" for manual download. For .ico, use an online PNG-to-ICO converter.</p>

  <script>
    function drawFavicon(canvasId) {
      const c = document.getElementById(canvasId);
      const ctx = c.getContext('2d');
      const s = c.width;
      const r = s / 2;

      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, '#6366f1');
      grad.addColorStop(0.5, '#a855f7');
      grad.addColorStop(1, '#22d3ee');

      ctx.beginPath();
      ctx.arc(r, r, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.font = `800 ${s * 0.45}px Montserrat, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('G', r, r + s * 0.02);
    }

    drawFavicon('c180');
    drawFavicon('c32');

    function download(canvasId, filename) {
      const c = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = c.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
